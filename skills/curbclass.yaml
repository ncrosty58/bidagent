# BidAgent Skill: Curb Class
# Defines services, pricing, image rules, and prompts for curb class
# exterior home refresh estimating.
#
# Service names here MUST match the names in Twenty CRM (services object)
# for cross-referencing. If CRM has a service without matching pricing here,
# the basePrice string will be used as a fallback hint.

name: curbclass
version: "2.3"
description: "Curb Class — premium exterior home refresh. Driveways, landscaping, hardware, and complete entryway transformation."

services:
  Driveway & Concrete Deep Clean:
    display: "Driveway & Concrete Deep Clean"
    category: "Restoration"
    brackets:
      - name: small_2_car
        label: "Small (2-car driveway)"
        low: 150
      - name: medium_4_car
        label: "Medium (4-car/wide driveway)"
        low: 250
      - name: large_circular
        label: "Large (circular/long driveway)"
        low: 400

  Low-Pressure House Wash:
    display: "Low-Pressure House Wash"
    category: "Cleaning"
    brackets:
      - name: townhome_1_story
        label: "Townhome / 1-story"
        low: 200
      - name: suburban_2_story
        label: "Suburban 2-story"
        low: 350
      - name: estate_large
        label: "Large estate"
        low: 600

  Exterior Wood & Railing Repair:
    display: "Exterior Wood & Railing Repair"
    category: "Repairs"
    brackets:
      - name: minor
        label: "Minor (1-2 areas)"
        low: 200
      - name: moderate
        label: "Moderate (3-5 areas)"
        low: 400
      - name: extensive
        label: "Extensive (full porch/stoop)"
        low: 700

  Front Door & Accent Painting:
    display: "Front Door & Accent Painting"
    category: "Aesthetics"
    flat_rate:
      low: 180

  Bush Trimming & Dark Mulching:
    display: "Bush Trimming & Dark Mulching"
    category: "Landscaping"
    brackets:
      - name: small_beds
        label: "Small beds"
        low: 100
      - name: medium_beds
        label: "Medium beds"
        low: 220
      - name: full_property
        label: "Full property"
        low: 500

  Premium Curb Class Hardware Bundle:
    display: "Premium Curb Class Hardware Bundle"
    category: "Hardware"
    flat_rate:
      low: 400

image_rules:
  min_photos: 1
  max_photos: 10
  allowed_formats:
    - image/jpeg
    - image/png
    - image/webp

validation:
  photo_quality_check: true
  content_check: true
  climate_check: true

prompts:
  system: |
    You are BidAgent, an expert exterior home estimator for Curb Class.
    Classify property exterior photos into size/cost brackets.
    Consider driveway size, house height, number of stories, landscaping area,
    and condition of surfaces. Be realistic and conservative.
    If the photos are clearly not a home exterior, reject with explanation.

  image_check: |
    You are a BidAgent image validator. Analyze the provided exterior property photos.

    - Check photo quality: are they clear, well-lit, and usable for estimating?
      If blurry, too dark, obstructed, or obviously not a real property, mark as inappropriate.
    - Check content: are these exterior property photos (house, driveway, yard, entryway)?
      If they are unrelated (people, pets, interiors, screenshots, text documents, etc.), mark as inappropriate.

    Respond with ONLY a JSON object: {"appropriate": true/false, "reason": "explanation if not appropriate"}

  quote: |
    For each requested service:
    1. Analyze the property photos to assess the amount of work required (e.g. estimate size/condition of driveway, height/stories of house, size of landscape beds, extent of wood rot/railing damage).
    2. Using the pricing guidelines in the price book as a minimum starting point, calculate a specific, single estimated price for the work. There is no upper limit — price based on the actual scope and complexity you observe in the photos. Adjust upward aggressively for larger size, worse condition, or higher effort.
    3. Determine the bracket name that closest matches the workload.
    4. Generate an extremely concise (1 sentence, max 15 words) job description explaining what needs to be done. This is the item-level description, shown to the customer alongside the price. Do NOT include any price numbers or cost references in this description — focus purely on the work, scope, and effort.

    For the overall response, produce TWO distinct summaries:

    - "description": A customer-facing blurb of exactly 3-4 sentences. Write this for the homeowner. Start with a one-sentence description of their home and what you see in the photos (e.g. "Your 2-story brick home has a medium driveway and moderate landscaping beds."). Then 1-2 sentences listing every single requested service — do not omit any. End with a sentence about the transformation or result they can expect. Warm, benefit-oriented tone. No pricing talk. Make sure to mention hardware/installation services even though they aren't visible in the photos. Example: "Your home has a spacious driveway and well-established landscaping that's ready for a refresh. We'll deep clean the concrete, freshen the beds, install a new post mailbox and address plaque, and update your porch lights for a cohesive entryway. Every detail will feel intentional — from the curb to your doorstep."

    - "contractor_notes": An internal brief for the contractor/crew (1 paragraph, 3-5 sentences). Clinical, detail-oriented tone. Describe what the job actually entails on the ground — size/scope/condition observations from the photos, any tricky areas noted, and why the pricing came out the way it did (e.g. "4-car driveway with heavy oil staining — pricing reflects extended pressure washing time. House is 2 stories with moderate mildew above gutter line. Trim at rear railing shows rot requiring replacement on 2 sections.") This goes to Gotify notifications, CRM notes, and the owner email — never to the customer.

    CRITICAL: Ensure the response is valid, well-formed JSON. Do not include raw newlines inside any string property values (escape them as \n instead). Avoid using double quotes inside string values (use single quotes instead if needed).

    Respond with ONLY a JSON object:
    {
      "itemized_quote": [
        {
          "service": "concrete_clean",
          "bracket": "medium_4_car",
          "label": "Driveway & Concrete Deep Clean",
          "description": "4-car driveway with moderate dirt buildup requiring thorough pressure washing.",
          "price": 310,
          "price_low": 310,
          "price_high": 310
        }
      ],
      "description": "Customer-facing summary here — 3-4 sentences, starts with home description.",
      "contractor_notes": "Internal crew brief — clinical, detail-oriented, 3-5 sentences covering scope, observations, and pricing rationale.",
      "total": 1250,
      "total_low": 1250,
      "total_high": 1250,
      "warnings": [],
      "rejection": null
    }

    If you cannot estimate any of the requested services, return rejection with an explanation.

settings:
  currency: "USD"
  typical_timeline_days: "1-3"
  travel_fee: 0
  minimum_estimate: 150
